<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estilos y Contenedores</title>
    <link rel="stylesheet" href="styles.css">
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            padding: 20px;
        }
        .main-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1>Demostración de Estilos</h1>
        
        <div class="table-container">
            <table>
    <thead>
        <tr>
            <th>Servicio</th>
            <th>Descripción</th>
            <th>Estado</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>Diseño Web</td>
            <td>Creación de interfaces modernas</td>
            <td><span class="status active">Activo</span></td>
        </tr>
        <tr>
            <td>Optimización SEO</td>
            <td>Mejora en motores de búsqueda</td>
            <td><span class="status pending">En progreso</span></td>
        </tr>
    </tbody>
</table>
</div>

        <div class="image-container">
            </div>
    </div>

</body>
</html>
